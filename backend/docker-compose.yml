version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lendly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lendly_dev}
      POSTGRES_USER:     ${POSTGRES_USER:-lendly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lendly_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lendly} -d ${POSTGRES_DB:-lendly_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: lendly_postgres_data
